        {
          "name": "request-update-pet",
          "event": [
            {
              "listen": "test",
              "script": {
                "exec": [
                  "const resJson = pm.response.json();\r",
                  "const reqJson = JSON.parse(pm.request.body.raw);\r",
                  "\r",
                  "pm.test(\"Pet atualizado\", function() {\r",
                  "    pm.response.to.have.status(200);\r",
                  "});\r",
                  "\r",
                  "pm.test(\"Tempo de Resposta Aceitável (<500ms)\", function () {\r",
                  "    pm.expect(pm.response.responseTime).to.be.below(500);\r",
                  "});\r",
                  "\r",
                  "pm.test(\"response Body é um JSON válido\", function() {\r",
                  "    pm.response.to.have.jsonBody();\r",
                  "});\r",
                  "\r",
                  "const categorySchema = {\r",
                  "    type: \"object\",\r",
                  "    properties: {\r",
                  "        id:   { type: \"number\" },\r",
                  "        name: { type: \"string\" }\r",
                  "    },\r",
                  "    required: [\"id\", \"name\"]\r",
                  "};\r",
                  "\r",
                  "const tagSchema = {\r",
                  "    type: \"object\",\r",
                  "    properties: {\r",
                  "        id:   { type: \"number\" },\r",
                  "        name: { type: \"string\" }\r",
                  "    }\r",
                  "};\r",
                  "\r",
                  "const petSchema = {\r",
                  "    type: \"object\",\r",
                  "    properties: {\r",
                  "        id:        { type: \"number\" },\r",
                  "        category:  categorySchema,\r",
                  "        name:      { type: \"string\", minLength: 1 },\r",
                  "        photoUrls: { type: \"array\", items: { type: \"string\" } },\r",
                  "        tags:      { type: \"array\", items: tagSchema },\r",
                  "        status:    { type: \"string\", enum: [\"available\", \"pending\", \"sold\"] }\r",
                  "    },\r",
                  "    required: [\"id\", \"name\", \"status\"],\r",
                  "    additionalProperties: false\r",
                  "};\r",
                  "\r",
                  "pm.test(\"Schema é válido!\", function() {\r",
                  "    pm.response.to.have.jsonSchema(petSchema);\r",
                  "});\r",
                  "\r",
                  "pm.test(\"Ids são números\", function(){\r",
                  "    pm.expect(resJson.id).to.be.a(\"number\");\r",
                  "    pm.expect(resJson.category.id).to.be.a(\"number\");\r",
                  "});\r",
                  "\r",
                  "pm.test(\"PhotoUrls e Tags são arrays\", function(){\r",
                  "    pm.expect(resJson.photoUrls).to.be.a(\"array\");\r",
                  "    pm.expect(resJson.tags).to.be.a(\"array\");\r",
                  "});\r",
                  "\r",
                  "pm.test(\"Nomes de categoria e do pet são string\", function() {\r",
                  "    pm.expect(resJson.category.name).to.be.a(\"string\");\r",
                  "    pm.expect(resJson.name).to.be.a(\"string\");\r",
                  "    pm.expect(resJson.status).to.be.a(\"string\");\r",
                  "});"
                ],
