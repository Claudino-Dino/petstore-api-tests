            {
              "listen": "test",
              "script": {
                "exec": [
                  "const resJson = pm.response.json();\r",
                  "const reqJson = JSON.parse(pm.request.body.raw);\r",
                  "\r",
                  "pm.collectionVariables.set(\"orderId\", resJson.id);\r",
                  "\r",
                  "pm.test(\"Pedido criado\", function() {\r",
                  "    pm.response.to.have.status(200);\r",
                  "});\r",
                  "\r",
                  "pm.test(\"response Body é um JSON válido\", function() {\r",
                  "    pm.response.to.have.jsonBody();\r",
                  "});\r",
                  "\r",
                  "pm.test(\"Tempo de Resposta Aceitável (<500ms)\", function () {\r",
                  "    pm.expect(pm.response.responseTime).to.be.below(500);\r",
                  "});\r",
                  "\r",
                  "const orderSchema = {\r",
                  "    type: \"object\",\r",
                  "    properties: {\r",
                  "        id:       { type: \"number\" },\r",
                  "        petId:    { type: \"number\" },\r",
                  "        quantity: { type: \"number\" },\r",
                  "        shipDate: { type: \"string\" },\r",
                  "        status:   { type: \"string\", enum: [\"placed\", \"approved\", \"delivered\"] },\r",
                  "        complete: { type: \"boolean\" }\r",
                  "    },\r",
                  "    required: [\"id\", \"petId\", \"quantity\", \"shipDate\", \"status\", \"complete\"]\r",
                  "};\r",
                  "\r",
                  "pm.test(\"Schema do pedido é válido\", function () {\r",
                  "    pm.response.to.have.jsonSchema(orderSchema);\r",
                  "});\r",
                  "\r",
                  "pm.test(\"ID do pedido foi gerado\", function () {\r",
                  "    pm.expect(resJson.id).to.exist;\r",
                  "});\r",
                  "\r",
                  "pm.test(\"PetID bate com o enviado\", function () {\r",
                  "    pm.expect(resJson.petId).to.eql(reqJson.petId);\r",
                  "});\r",
                  "\r",
                  "pm.test(\"Status é placed\", function () {\r",
                  "    pm.expect(resJson.status).to.eql(\"placed\");\r",
                  "});\r",
                  "\r",
                  "pm.test(\"Complete bate com o enviado\", function () {\r",
                  "    pm.expect(resJson.complete).to.eql(reqJson.complete);\r",
                  "});"
                ],
